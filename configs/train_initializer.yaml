# 初始化器训练配置文件
# 训练思路：
# 1. 从T=4,3,2,1随机采样一个时间步
# 2. 使用initializer生成中间状态 x_t = z_y + κ·√η_t·predicted_noise
# 3. 使用预训练的UNet直接预测干净HR x_0
# 4. 计算预测的x_0与真实z_start的损失
# 5. 只更新initializer的参数

# ============================================================================
# 实验设置
# ============================================================================
experiment:
  name: "initializer"
  save_dir: "LPNSR/experiments/initializer"
  keep_recent_checkpoints: 3  # 保留最近N个checkpoint
  log_interval: 5000  # 每N步打印一次日志
  save_interval: 1  # 每N个epoch保存一次checkpoint

# ============================================================================
# ResShift预训练模型路径
# ============================================================================
resshift:
  # VAE配置文件路径
  vae_config_path: "LPNSR/configs/vqvae_config.yaml"

  # VAE模型路径（冻结）
  vae_path: "LPNSR/pretrained/autoencoder_vq_f4.pth"

  # UNet配置文件路径
  unet_config_path: "LPNSR/configs/unet_config.yaml"

  # ResShift UNet模型路径（冻结）
  unet_path: "LPNSR/pretrained/resshift_realsrx4_s4_v3.pth"

# ============================================================================
# 初始化器配置
# ============================================================================
initializer:
  config_path: "LPNSR/configs/initializer_config.yaml"

# ============================================================================
# 训练设置
# ============================================================================
training:
  # 基础设置
  num_epochs: 50
  batch_size: 8
  num_workers: 16

  # ResShift扩散过程超参数（ResShift v3配置）
  diffusion:
    # 总扩散步数T
    num_timesteps: 4

    # κ (kappa)：方差控制参数
    kappa: 2.0

    # η调度类型
    eta_schedule: "exponential"

    # η_1：最小噪声水平
    min_noise_level: 0.2

    # η_T：最大噪声水平
    etas_end: 0.99

    # 指数调度的幂次
    eta_power: 0.3

    # 输入归一化
    normalize_input: true
    latent_flag: true

  # 采样设置
  sampling_steps: 4

  # 优化技巧
  use_amp: true  # 混合精度训练
  use_gradient_checkpointing: true  # 梯度检查点
  gradient_clip: 1.0  # 梯度裁剪
  gradient_accumulation_steps: 4  # 梯度累积步数

# ============================================================================
# 数据设置
# ============================================================================
data:
  # 训练数据
  train:
    hr_dir: "LPNSR/traindata"  # HR图像目录
    lr_dir: null  # LR图像目录（如果为null，则通过退化生成）
    crop_size: 256  # 裁剪大小
    scale: 4  # 超分倍数

    # 数据增强
    use_flip: true
    use_rot: true
    use_color_jitter: false

# ============================================================================
# 退化设置
# ============================================================================
degradation:
  use_degradation: true  # 是否使用退化生成LR
  config_path: "LPNSR/configs/realesrgan_degradation.yaml"

# ============================================================================
# 损失函数设置
# ============================================================================
loss:
  # L2损失（预测z0与真实z0的MSE，在潜空间计算）
  l2_weight: 1.0

  # LPIPS感知损失（在图像空间计算，梯度可以回传）
  lpips_weight: 2.0
  lpips_net_type: 'alex'  # 可选: 'alex', 'vgg', 'squeeze'

  # GAN对抗损失（在图像空间计算，梯度可以回传）
  gan_weight: 0.1  # GAN损失权重
  gan_type: 'hinge'  # GAN类型: 'vanilla', 'lsgan', 'wgan', 'wgan-gp', 'hinge'
  disc_type: 'patch'  # 判别器类型: 'patch', 'unet'
  disc_ndf: 64  # 判别器基础通道数
  disc_n_layers: 4  # 判别器层数（仅PatchGAN）
  disc_norm_type: 'spectral'  # 判别器归一化类型: 'batch', 'instance', 'spectral', 'none'
  disc_lr: 1.0e-4  # 判别器学习率
  disc_start_epoch: 0  # 判别器开始训练的epoch

# ============================================================================
# 优化器设置
# ============================================================================
optimizer:
  type: "AdamW"
  lr: 5.0e-5  # 初始化器可以使用稍高的学习率
  beta1: 0.9
  beta2: 0.999
  weight_decay: 1.0e-6

# ============================================================================
# 学习率调度器设置
# ============================================================================
scheduler:
  type: "CosineAnnealing"

  # CosineAnnealing参数
  min_lr: 1.0e-5

  # StepLR参数
  step_size: 50
  gamma: 0.5

# ============================================================================
# 硬件设置
# ============================================================================
hardware:
  gpu_ids: [0]  # 使用的GPU ID
  distributed: false  # 是否使用分布式训练
  find_unused_parameters: false  # DDP设置
