experiment:
  name: "swinir_sr"
  save_dir: "LPNSR/experiments/swinir_sr"
  keep_recent_checkpoints: 3
  log_interval: 5000
  save_interval: 1

swinir:
  # 预训练权重路径（可选）
  pretrained_path: null

  # 模型配置
  patch_size: 1
  embed_dim: 240
  depths: [12, 12, 12, 12, 12, 12]
  num_heads: [12, 12, 12, 12, 12, 12]
  window_size: 8
  mlp_ratio: 2.0
  drop_path_rate: 0.1
  ape: false
  upsampler: "nearest+conv"
  resi_connection: "1conv"

training:
  num_epochs: 100
  batch_size: 8
  num_workers: 16

  use_amp: true
  use_gradient_checkpointing: true
  gradient_clip: 1.0

data:
  train:
    hr_dir: "LPNSR/traindata"
    lr_dir: null
    crop_size: 256
    scale: 4
    use_flip: true
    use_rot: true
    use_color_jitter: false

degradation:
  use_degradation: true
  config_path: "LPNSR/configs/realesrgan_degradation.yaml"

loss:
  # 基础损失类型: l2, l1, charbonnier
  loss_type: "l1"
  pixel_weight: 1.0

  # LPIPS感知损失
  lpips_weight: 2.0
  lpips_net_type: 'vgg'

  # GAN损失
  gan_weight: 0.1
  gan_type: 'hinge'
  disc_type: 'patch'
  disc_ndf: 64
  disc_n_layers: 3
  disc_norm_type: 'spectral'
  disc_lr: 5.0e-5
  disc_start_epoch: 2
  disc_update_freq: 2

optimizer:
  type: "AdamW"
  lr: 5.0e-5
  beta1: 0.9
  beta2: 0.999
  weight_decay: 1.0e-6

scheduler:
  type: "CosineAnnealing"
  min_lr: 1.0e-5

  step_size: 50
  gamma: 0.5

hardware:
  gpu_ids: [0]
  distributed: false
  find_unused_parameters: false
