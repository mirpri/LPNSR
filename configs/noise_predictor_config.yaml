# 自适应噪声预测器配置文件
# 约50M参数的标准配置

# ============================================================================
# 基础配置
# ============================================================================

# 潜在空间通道数（必须与VQVAE的embed_dim一致）
latent_channels: 3

# ============================================================================
# 模型架构配置
# ============================================================================

# 模型基础通道数
model_channels: 160

# 各层的通道倍数（定义U-Net的3层结构）
# 通道数分别为: 160, 320, 480
channel_mult: [1, 2, 3]

# 每层的残差块数量
num_res_blocks: 2

# 使用注意力机制的层级数（从浅层开始计数）
attention_levels: 2

# 多头注意力的头数
num_heads: 10

# ============================================================================
# 训练配置
# ============================================================================

# Dropout概率（用于正则化）
dropout: 0.0

# 是否使用scale-shift归一化
use_scale_shift_norm: true

# ============================================================================
# 高级功能配置
# ============================================================================

# 是否使用交叉注意力（融合含噪特征和LR特征）
use_cross_attention: true

# 是否使用频域感知模块（增强纹理细节预测）
use_frequency_aware: true

# 是否使用xFormers加速（需要安装xformers库）
# 优势：显存占用降低30-50%，推理速度提升20-40%
use_xformers: true

# ============================================================================
# 注意事项
# ============================================================================
# 
# 1. latent_channels必须与VQVAE的embed_dim一致
# 2. 该配置约64.32M参数，适合大多数超分辨率任务
# 3. model_channels=160，channel_mult=[1,2,3]，通道数为160→320→480
# 4. num_res_blocks=2，每层2个残差块，平衡性能和参数量
# 5. attention_levels=2，前2层使用注意力机制
# 6. use_cross_attention=true，启用交叉注意力融合LR特征
# 7. use_frequency_aware=true，启用频域感知增强纹理
# 8. use_xformers=true，启用xFormers加速（需要安装xformers库）
# 9. dropout=0.0，推理时不使用dropout
