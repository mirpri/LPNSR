experiment:
  name: "noise_predictor"
  save_dir: "LPNSR/experiments/noise_predictor"
  keep_recent_checkpoints: 3
  log_interval: 5000
  save_interval: 1

resshift:
  vae_path: "LPNSR/pretrained/autoencoder_vq_f4.pth"
  unet_path: "LPNSR/pretrained/resshift_realsrx4_s4_v3.pth"

noise_predictor:
  config_path: "LPNSR/configs/noise_predictor_config.yaml"

training:
  num_epochs: 50
  batch_size: 8
  num_workers: 16

  diffusion:
    num_timesteps: 4
    kappa: 2.0
    eta_schedule: "exponential"
    min_noise_level: 0.2
    etas_end: 0.99
    eta_power: 0.3
    normalize_input: true
    latent_flag: true

  sampling_steps: 4

  use_amp: true
  use_gradient_checkpointing: true
  gradient_clip: 1.0

data:
  train:
    hr_dir: "LPNSR/traindata"
    lr_dir: null
    crop_size: 256
    scale: 4
    use_flip: true
    use_rot: true
    use_color_jitter: false

degradation:
  use_degradation: true
  config_path: "LPNSR/configs/realesrgan_degradation.yaml"

loss:
  l2_weight: 1.0

  lpips_weight: 2.0
  lpips_net_type: 'alex'

  gan_weight: 0.1
  gan_type: 'hinge'
  disc_type: 'patch'
  disc_ndf: 64
  disc_n_layers: 3
  disc_norm_type: 'spectral'
  disc_lr: 5.0e-5
  disc_start_epoch: 2
  disc_update_freq: 2

optimizer:
  type: "AdamW"
  lr: 5.0e-5
  beta1: 0.9
  beta2: 0.999
  weight_decay: 1.0e-6

scheduler:
  type: "CosineAnnealing"

  min_lr: 1.0e-5

  step_size: 50
  gamma: 0.5

hardware:
  gpu_ids: [0]
  distributed: false
  find_unused_parameters: false
