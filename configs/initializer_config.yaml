# EDSR-Unet初始化器配置文件
# 基于EDSR残差块和U-Net架构的初始化器，用于生成更好的初始噪声分布

# ============================================================================
# 基础配置
# ============================================================================

# 潜在空间通道数（必须与VQVAE的embed_dim一致）
latent_channels: 3

# ============================================================================
# 模型架构配置
# ============================================================================

# 模型基础通道数
model_channels: 128

# 各层的通道倍数（定义U-Net的4层结构）
channel_mult: [1, 2, 4, 8]

# 每层的残差块数量
num_res_blocks: 2

# 密集连接的增长率
growth_rate: 32

# 残差缩放因子
res_scale: 0.1

# 是否输出双重z（均值和方差）
double_z: true

# ============================================================================
# 注意事项
# ============================================================================
# 
# 1. latent_channels必须与VQVAE的embed_dim一致
# 2. model_channels=192，channel_mult=[1,2,4,8]，通道数为192→384→768→1536
# 3. num_res_blocks=2，每层2个残差块，平衡性能和参数量
# 4. growth_rate=32，密集连接的增长率
# 5. res_scale=0.1，残差缩放因子
# 6. double_z=true，输出均值和方差
# 7. 使用EDSR残差块和密集连接增强特征提取能力
# 8. 实现了U-Net架构的跳跃连接，融合不同层级的特征
# 9. 初始化器只接受初始LR和时间步作为输入，不接受中间状态
