model:
  noise_predictor_path: "LPNSR/pretrained/noise_predictor.pth"
  resshift_path: "LPNSR/pretrained/resshift_realsrx4_s4_v3.pth"
  vae_path: "LPNSR/pretrained/autoencoder_vq_f4.pth"

vae:
  lora:
    rank: 8
    alpha: 1.0
    tune_decoder: false

resshift_unet:
  image_size: 64
  in_channels: 3
  model_channels: 160
  out_channels: 3
  attention_resolutions: [64, 32, 16, 8]
  channel_mult: [1, 2, 2, 4]
  num_res_blocks: [2, 2, 2, 2]
  num_head_channels: 32
  use_scale_shift_norm: true
  resblock_updown: false
  swin_depth: 2
  swin_embed_dim: 192
  window_size: 8
  mlp_ratio: 4
  cond_lq: true
  lq_size: 64
  dropout: 0.0
  use_fp16: false
  conv_resample: true
  dims: 2
  patch_norm: false

noise_predictor:
  config_path: "LPNSR/configs/noise_predictor_config.yaml"

diffusion:
  num_timesteps: 4
  kappa: 2.0
  eta_schedule: "exponential"
  eta_power: 0.3
  min_noise_level: 0.2
  etas_end: 0.99
  normalize_input: true
  latent_flag: true
  scale_factor: 1.0

inference:
  num_steps: 4
  scale_factor: 4

  use_noise_predictor: true
  use_swinir: true

  color_correction: true

  padding_offset: 64

  chop_size: 256
  chop_stride: 128
  chop_bs: 1

  device: "cuda"
  use_amp: true
  seed: 12345

  save_format: "png"
  rgb2bgr: true

  swinir:
    model_path: "LPNSR/pretrained/003_realSR_BSRGAN_DFOWMFC_s64w8_SwinIR-L_x4_GAN.pth"
    img_size: 64
    window_size: 8
    depths: [6, 6, 6, 6, 6, 6, 6, 6, 6]
    embed_dim: 240
    num_heads: [8, 8, 8, 8, 8, 8, 8, 8, 8]
    mlp_ratio: 2
    upsampler: "nearest+conv"
    resi_connection: "3conv"
