# UNet-SwinTransformer 模型配置文件
# 此配置文件包含模型自身的可配置参数（不影响预训练权重加载）

# ============================================================================
# 模型可配置参数
# ============================================================================

# Dropout配置
dropout: 0.0  # Dropout概率，范围[0.0, 1.0]

# 精度配置
use_fp16: false  # 是否使用float16混合精度

# 卷积配置
conv_resample: true  # 上下采样是否使用卷积（true）或插值（false）

# 维度配置
dims: 2  # 信号维度：2表示2D图像，3表示3D体积

# Swin Transformer配置
patch_norm: false  # 是否对patch进行归一化

# ============================================================================
# 注意事项
# ============================================================================
# 
# 以下参数会影响模型结构，必须与预训练权重一致，不应在此配置：
# - image_size: 输入图像大小
# - in_channels: 输入通道数
# - model_channels: 模型基础通道数
# - out_channels: 输出通道数
# - num_res_blocks: 每个级别的残差块数量
# - attention_resolutions: 应用注意力的分辨率
# - channel_mult: 通道倍数
# - num_head_channels: 每个注意力头的通道数
# - use_scale_shift_norm: 是否使用scale-shift归一化
# - resblock_updown: 是否使用残差块进行上下采样
# - swin_depth: Swin Transformer深度
# - swin_embed_dim: Swin Transformer嵌入维度
# - window_size: Swin Transformer窗口大小
# - mlp_ratio: MLP隐藏维度比率
# - cond_lq: 是否条件化低质量图像
# - cond_mask: 是否条件化mask
# - lq_size: 低质量图像大小
