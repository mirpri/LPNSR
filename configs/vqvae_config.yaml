# VQ-VAE 自编码器模型配置文件
# 此配置文件包含模型自身的可配置参数（不影响预训练权重加载）

# ============================================================================
# 模型可配置参数
# ============================================================================

# LoRA配置
lora:
  rank: 8  # LoRA的秩，控制低秩分解的维度，范围[4-16]
  alpha: 1.0  # LoRA的缩放因子，控制LoRA层的影响强度
  tune_decoder: false  # 是否对解码器应用LoRA微调

# 量化配置
quantization:
  remap: null  # Codebook重映射策略，null表示不重映射
  sane_index_shape: false  # 索引形状：false返回(B,H*W)，true返回(B,H,W)

# ============================================================================
# 注意事项
# ============================================================================
# 
# 以下参数会影响模型结构，必须与预训练权重一致，不应在此配置：
# 
# ddconfig参数（编码器/解码器架构）：
# - double_z: 是否使用双倍z通道
# - z_channels: 潜在空间通道数
# - resolution: 输入分辨率
# - in_channels: 输入图像通道数
# - out_ch: 输出图像通道数
# - ch: 基础通道数
# - ch_mult: 通道倍数列表
# - num_res_blocks: 残差块数量
# - attn_resolutions: 注意力层的分辨率列表
# - dropout: Dropout率
# - padding_mode: 填充模式
# 
# VQModelTorch参数：
# - n_embed: Codebook大小（词汇表大小）
# - embed_dim: 嵌入维度
# 
# 这些参数定义了模型的架构，改变它们会导致预训练权重无法加载。
